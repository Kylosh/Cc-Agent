<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Store - 水果外卖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #0071e3;
            --color-secondary: #f5f5f7;
            --color-text: #1d1d1d;
            --color-text-light: #6e6e73;
            --color-border: #e5e5e7;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            --radius-md: 0.75rem;
            --radius-lg: 1.125rem;
            --radius-xl: 2rem;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 10px 20px rgba(0, 0, 0, 0.15);
            --transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: var(--font-family);
            background-color: #ffffff;
            color: var(--color-text);
            line-height: 1.6;
        }

        *:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--color-border);
            padding: 1rem 2rem;
        }

        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .logo:hover {
            color: var(--color-primary);
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav button {
            text-decoration: none;
            color: var(--color-text);
            transition: var(--transition);
            background: none;
            border: none;
            font-size: inherit;
            font-family: inherit;
            cursor: pointer;
            padding: 0.25rem 0;
        }

        nav button:hover {
            color: var(--color-primary);
        }

        .hero {
            height: 500px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.25rem;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 0.875rem 2rem;
            border-radius: var(--radius-xl);
            border: none;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background: #0066cc;
            transform: scale(1.05);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 3rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .product-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-8px);
        }

        .product-image {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .product-image.apple { background: linear-gradient(135deg, #ff6b6b 0%, #ffa502 100%); }
        .product-image.banana { background: linear-gradient(135deg, #ffd89b 0%, #ffc938 100%); }
        .product-image.grape { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

        .product-info {
            padding: 1.5rem;
        }

        .product-name {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary);
            margin: 1rem 0;
        }

        .add-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .add-btn:hover {
            background: #0066cc;
        }

        .add-btn:active {
            transform: scale(0.98);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .feature {
            text-align: center;
        }

        .feature-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .feature h3 {
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .feature p {
            color: var(--color-text-light);
        }

        footer {
            background: var(--color-secondary);
            padding: 3rem 2rem;
            text-align: center;
            color: var(--color-text-light);
        }

        footer a {
            color: var(--color-primary);
            text-decoration: none;
            transition: var(--transition);
        }

        footer a:hover {
            color: #0066cc;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .hero p { font-size: 1rem; }
            .products-grid { grid-template-columns: 1fr; }
            nav { gap: 1rem; }
            header { padding: 1rem; }
            .container { padding: 2rem 1rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <a href="#main" class="sr-only">跳到主要内容</a>

    <header role="banner">
        <div class="header-content">
            <button class="logo" onclick="scrollToSection('top')" aria-label="Fruit Store 主页">
                🍎 Fruit Store
            </button>
            <nav role="navigation" aria-label="主导航">
                <button onclick="scrollToSection('products')" aria-label="查看产品">产品</button>
                <button onclick="scrollToSection('about')" aria-label="关于我们">关于</button>
                <button onclick="showContact()" aria-label="联系方式">联系</button>
            </nav>
        </div>
    </header>

    <section class="hero" id="top" role="region" aria-label="欢迎横幅">
        <div>
            <h1>新鲜水果，送到你家</h1>
            <p>精选优质水果，每日配送，品质保证</p>
            <button class="btn btn-primary" onclick="scrollToSection('products')" aria-label="立即购买">立即购买</button>
        </div>
    </section>

    <main id="main">
        <section class="container" id="products" role="region" aria-label="热销产品">
            <h2 class="section-title">热销产品</h2>
            <div class="products-grid" role="grid">
                <article class="product-card" role="gridcell">
                    <div class="product-image apple" role="img" aria-label="新鲜苹果"></div>
                    <div class="product-info">
                        <h3 class="product-name">新鲜苹果</h3>
                        <p>富士苹果，甜度高，口感爽脆</p>
                        <p class="product-price">¥29.9</p>
                        <button class="add-btn" onclick="addProduct(this, '新鲜苹果')" aria-label="添加新鲜苹果到购物车">加入购物车</button>
                    </div>
                </article>

                <article class="product-card" role="gridcell">
                    <div class="product-image banana" role="img" aria-label="进口香蕉"></div>
                    <div class="product-info">
                        <h3 class="product-name">进口香蕉</h3>
                        <p>菲律宾香蕉，香甜软糯</p>
                        <p class="product-price">¥19.9</p>
                        <button class="add-btn" onclick="addProduct(this, '进口香蕉')" aria-label="添加进口香蕉到购物车">加入购物车</button>
                    </div>
                </article>

                <article class="product-card" role="gridcell">
                    <div class="product-image grape" role="img" aria-label="巨峰葡萄"></div>
                    <div class="product-info">
                        <h3 class="product-name">巨峰葡萄</h3>
                        <p>新鲜葡萄，多汁饱满</p>
                        <p class="product-price">¥49.9</p>
                        <button class="add-btn" onclick="addProduct(this, '巨峰葡萄')" aria-label="添加巨峰葡萄到购物车">加入购物车</button>
                    </div>
                </article>
            </div>
        </section>

        <section class="container" id="about" role="region" aria-label="我们的优势">
            <h2 class="section-title">为什么选择我们</h2>
            <div class="features" role="list">
                <article class="feature" role="listitem">
                    <span class="feature-icon" aria-hidden="true">🚚</span>
                    <h3>快速配送</h3>
                    <p>下单后24小时内送达</p>
                </article>
                <article class="feature" role="listitem">
                    <span class="feature-icon" aria-hidden="true">✨</span>
                    <h3>品质保证</h3>
                    <p>每个水果都经过质检</p>
                </article>
                <article class="feature" role="listitem">
                    <span class="feature-icon" aria-hidden="true">💰</span>
                    <h3>价格优惠</h3>
                    <p>直接采购，价格最优</p>
                </article>
            </div>
        </section>
    </main>

    <footer role="contentinfo">
        <p>&copy; 2026 Fruit Store. All rights reserved. | <a href="#" aria-label="隐私政策">隐私政策</a> | <a href="#" aria-label="服务条款">服务条款</a></p>
    </footer>

    <script>
        function scrollToSection(id) {
            const element = id === 'top' ? document.body : document.getElementById(id);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function addProduct(button, productName) {
            const originalText = button.textContent;
            button.textContent = '✓ 已添加';
            button.disabled = true;

            setTimeout(() => {
                button.textContent = originalText;
                button.disabled = false;
            }, 1500);

            const liveRegion = document.createElement('div');
            liveRegion.setAttribute('role', 'status');
            liveRegion.setAttribute('aria-live', 'polite');
            liveRegion.className = 'sr-only';
            liveRegion.textContent = `${productName} 已添加到购物车`;
            document.body.appendChild(liveRegion);

            setTimeout(() => liveRegion.remove(), 1000);
        }

        function showContact() {
            alert('📞 服务热线: service@fruitstore.com');
        }
    </script>
</body>
</html>
