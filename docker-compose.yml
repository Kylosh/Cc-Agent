version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: fruit_shop_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-root123}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - fruit_shop_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fruit_shop_backend
    environment:
      PORT: ${BACKEND_PORT:-5000}
      NODE_ENV: ${BACKEND_ENV:-development}
      MONGODB_URI: mongodb://${MONGODB_USER:-root}:${MONGODB_PASSWORD:-root123}@mongodb:27017/fruit_shop
      JWT_SECRET: ${JWT_SECRET:-your_secret_key_here_change_in_production}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - fruit_shop_network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fruit_shop_frontend
    environment:
      REACT_APP_API_URL: ${BACKEND_URL:-http://localhost:5000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - fruit_shop_network
    command: npm start

volumes:
  mongodb_data:
  mongodb_config:

networks:
  fruit_shop_network:
    driver: bridge
